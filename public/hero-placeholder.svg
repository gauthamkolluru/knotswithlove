<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="g" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde8f0"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </radialGradient>
  </defs>

  <!-- Background + border -->
  <circle cx="200" cy="200" r="198" fill="url(#g)"/>
  <circle cx="200" cy="200" r="194" fill="none" stroke="#d4a5b5" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- Head -->
  <ellipse cx="200" cy="118" rx="40" ry="43" fill="#d4a5b5" opacity="0.55"/>
  <!-- Hair -->
  <ellipse cx="200" cy="97" rx="43" ry="26" fill="#c49aab" opacity="0.5"/>
  <!-- Ears -->
  <ellipse cx="161" cy="120" rx="8" ry="11" fill="#d4a5b5" opacity="0.4"/>
  <ellipse cx="239" cy="120" rx="8" ry="11" fill="#d4a5b5" opacity="0.4"/>

  <!-- Body/torso -->
  <ellipse cx="200" cy="218" rx="60" ry="72" fill="#a8c5da" opacity="0.42"/>

  <!-- Arms -->
  <ellipse cx="146" cy="232" rx="21" ry="48" fill="#a8c5da" opacity="0.38" transform="rotate(-12, 146, 232)"/>
  <ellipse cx="254" cy="232" rx="21" ry="48" fill="#a8c5da" opacity="0.38" transform="rotate(12, 254, 232)"/>

  <!-- Yarn ball -->
  <circle cx="192" cy="292" r="40" fill="#d4a5b5" opacity="0.48"/>
  <circle cx="192" cy="292" r="38" fill="none" stroke="#c49aab" stroke-width="1.5" opacity="0.55"/>
  <ellipse cx="192" cy="292" rx="38" ry="15" fill="none" stroke="#c49aab" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="192" cy="292" rx="38" ry="24" fill="none" stroke="#c49aab" stroke-width="1.2" opacity="0.4" transform="rotate(42, 192, 292)"/>
  <ellipse cx="192" cy="292" rx="15" ry="38" fill="none" stroke="#b8d9ef" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="192" cy="292" rx="24" ry="38" fill="none" stroke="#b8d9ef" stroke-width="1.2" opacity="0.4" transform="rotate(-42, 192, 292)"/>

  <!-- Yarn tail -->
  <path d="M 226 270 Q 260 244 280 222 Q 293 210 296 196" stroke="#d4a5b5" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65"/>

  <!-- Crochet hook -->
  <rect x="289" y="148" width="9" height="54" rx="4.5" fill="#a8c5da" opacity="0.82"/>
  <path d="M 294 148 Q 306 136 312 144 Q 315 153 308 159" fill="none" stroke="#a8c5da" stroke-width="3.5" stroke-linecap="round" opacity="0.82"/>

  <!-- Sparkles -->
  <text x="68"  y="150" font-size="17" fill="#d4a5b5" opacity="0.4" font-family="sans-serif">✦</text>
  <text x="322" y="108" font-size="11" fill="#a8c5da" opacity="0.4" font-family="sans-serif">✦</text>
  <text x="95"  y="338" font-size="10" fill="#d4a5b5" opacity="0.38" font-family="sans-serif">✦</text>
  <text x="318" y="345" font-size="14" fill="#a8c5da" opacity="0.38" font-family="sans-serif">✦</text>

  <!-- "photo coming soon" pill -->
  <rect x="108" y="356" width="184" height="27" rx="13.5" fill="rgba(255,255,255,0.78)"/>
  <text x="200" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#4a7fa8" opacity="0.88" font-style="italic">photo coming soon</text>
</svg>
